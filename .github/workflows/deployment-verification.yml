name: Deployment Verification

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  verify:
    name: Verify deployed site
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.BASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run curl verification
        run: ./scripts/verify-deployment.sh
