<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello World - Home Note</title>
    <style>
      body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        margin: 0;
        padding: 0;
      }
      main {
        max-width: 720px;
        margin: 15vh auto 0;
        padding: 32px;
        background: rgba(15, 23, 42, 0.75);
        border: 1px solid #1e293b;
        border-radius: 16px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.35);
      }
      h1 {
        font-size: 2.5rem;
        margin-bottom: 12px;
      }
      p {
        font-size: 1.1rem;
        line-height: 1.6;
      }
      a {
        color: #38bdf8;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        background: #1e293b;
        color: #94a3b8;
        font-size: 0.85rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Coolify Ready</span>
      <h1>Hello, world 👋</h1>
      <p>This repository now hosts a minimal static site for Coolify deployments.</p>
      <p>Use this page to confirm the deployment is live and healthy.</p>
      <p>
        <a href="/logs/">View deployment verification logs</a>
      </p>
    </main>
  </body>
</html>
